services:
  - type: web
    name: code-review-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web.app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: RENDER
        value: "true"
      - key: GEMINI_API_KEY
        sync: false
